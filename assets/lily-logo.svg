<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-labelledby="lily-logo-title lily-logo-desc">
  <title id="lily-logo-title">Legacy Lily store event logo</title>
  <desc id="lily-logo-desc">A dark luxury square logo with a gold lily emblem and the word Lily.</desc>
  <defs>
    <radialGradient id="bg" cx="50%" cy="18%" r="92%">
      <stop offset="0" stop-color="#173d4f"/>
      <stop offset=".48" stop-color="#102031"/>
      <stop offset="1" stop-color="#060910"/>
    </radialGradient>
    <linearGradient id="gold" x1="16" y1="18" x2="112" y2="110" gradientUnits="userSpaceOnUse">
      <stop stop-color="#fff2b0"/>
      <stop offset=".24" stop-color="#d5aa4b"/>
      <stop offset=".52" stop-color="#fff3b7"/>
      <stop offset=".78" stop-color="#b88525"/>
      <stop offset="1" stop-color="#f2dc88"/>
    </linearGradient>
    <linearGradient id="petal" x1="35" y1="26" x2="93" y2="80" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f8ffff"/>
      <stop offset=".5" stop-color="#b9f0ef"/>
      <stop offset="1" stop-color="#5bb7b0"/>
    </linearGradient>
    <filter id="glow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="128" height="128" rx="24" fill="url(#bg)"/>
  <rect x="4" y="4" width="120" height="120" rx="20" fill="none" stroke="url(#gold)" stroke-width="1.5"/>
  <rect x="10" y="10" width="108" height="108" rx="16" fill="none" stroke="#d8b767" stroke-opacity=".26"/>

  <g aria-hidden="true" filter="url(#glow)">
    <path d="M64 24c9 12 9 27 0 43-9-16-9-31 0-43Z" fill="url(#petal)" stroke="url(#gold)" stroke-width="1.4"/>
    <path d="M47 36c12 6 18 17 17 31-13-6-19-16-17-31Z" fill="url(#petal)" stroke="url(#gold)" stroke-width="1.4" opacity=".94"/>
    <path d="M81 36c-12 6-18 17-17 31 13-6 19-16 17-31Z" fill="url(#petal)" stroke="url(#gold)" stroke-width="1.4" opacity=".94"/>
    <path d="M43 60c9 4 16 8 21 15 5-7 12-11 21-15-5 14-12 22-21 27-9-5-16-13-21-27Z" fill="#132335" stroke="url(#gold)" stroke-width="1.2"/>
    <path d="M64 68v22" stroke="url(#gold)" stroke-width="1.3" stroke-linecap="round"/>
    <circle cx="64" cy="59" r="2.2" fill="#f7df88"/>
  </g>

  <path d="M25 92h78" fill="none" stroke="url(#gold)" stroke-width="1"/>
  <text x="64" y="108" fill="url(#gold)" font-family="Georgia, 'Times New Roman', serif" font-size="20" font-weight="700" text-anchor="middle">Lily</text>
</svg>
